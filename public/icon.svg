<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0a0e18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8ecf0"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c0c8d0"/>
      <stop offset="70%" stop-color="#e0e4e8"/>
      <stop offset="100%" stop-color="#b0b8c0"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="25%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="75%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="256" cy="230" r="180" fill="url(#glow)"/>

  <!-- Network lines (subtle) -->
  <g opacity="0.15" stroke="#3B82F6" stroke-width="0.8" fill="none">
    <line x1="80" y1="120" x2="180" y2="160"/>
    <line x1="432" y1="100" x2="340" y2="160"/>
    <line x1="60" y1="300" x2="140" y2="260"/>
    <line x1="452" y1="320" x2="370" y2="270"/>
    <line x1="100" y1="420" x2="190" y2="350"/>
    <line x1="412" y1="400" x2="330" y2="340"/>
    <circle cx="80" cy="120" r="3" fill="#3B82F6"/>
    <circle cx="432" cy="100" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="300" r="2" fill="#3B82F6"/>
    <circle cx="452" cy="320" r="3" fill="#3B82F6"/>
    <circle cx="100" cy="420" r="2.5" fill="#3B82F6"/>
    <circle cx="412" cy="400" r="2" fill="#3B82F6"/>
  </g>

  <!-- Hexagon -->
  <polygon
    points="256,100 376,169 376,307 256,376 136,307 136,169"
    fill="none"
    stroke="url(#hexStroke)"
    stroke-width="3"
    filter="url(#glowFilter)"
  />

  <!-- Inner structure lines -->
  <g stroke="#3B82F6" stroke-width="1.2" opacity="0.5">
    <line x1="256" y1="100" x2="256" y2="238"/>
    <line x1="136" y1="169" x2="256" y2="238"/>
    <line x1="376" y1="169" x2="256" y2="238"/>
    <line x1="136" y1="307" x2="256" y2="238"/>
    <line x1="376" y1="307" x2="256" y2="238"/>
    <line x1="256" y1="376" x2="256" y2="238"/>
  </g>

  <!-- Corner dots -->
  <g fill="#3B82F6" filter="url(#glowFilter)">
    <circle cx="256" cy="100" r="5"/>
    <circle cx="376" cy="169" r="5"/>
    <circle cx="376" cy="307" r="5"/>
    <circle cx="256" cy="376" r="5"/>
    <circle cx="136" cy="307" r="5"/>
    <circle cx="136" cy="169" r="5"/>
  </g>

  <!-- BF Text -->
  <text x="256" y="260" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="110" fill="url(#metal)" letter-spacing="4">BF</text>

  <!-- BYTEFORCE text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#e0e4e8" letter-spacing="12">BYTEFORCE</text>

  <!-- Rainbow bar -->
  <rect x="168" y="434" width="176" height="4" rx="2" fill="url(#rainbow)"/>
</svg>
